<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SDM Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="bg-grid"></div>
    <main class="container">
      <header class="hero">
        <p class="badge">Distributed Systems Project</p>
        <h1>Simple Download Manager</h1>
        <p class="subtitle">
          Multi-threaded segmented downloader with pause/resume, retries, monitoring and
          persistent history.
        </p>
      </header>

      <section class="card form-card">
        <h2>New Download</h2>
        <form id="download-form">
          <label>
            URL
            <input type="url" id="url" placeholder="https://example.com/big-file.zip" required />
          </label>

          <div class="row">
            <label>
              Segments
              <input type="number" id="segments" min="1" max="32" value="4" />
            </label>
            <label>
              Max retries
              <input type="number" id="max-retries" min="0" max="20" value="3" />
            </label>
            <label>
              Bandwidth limit (KB/s)
              <input type="number" id="bandwidth" min="1" placeholder="optional" />
            </label>
          </div>

          <button type="submit">Add Download</button>
          <p id="form-message" class="message"></p>
        </form>
      </section>

      <section class="card">
        <div class="section-head">
          <h2>Active Tasks</h2>
          <button id="refresh-btn" class="ghost">Refresh</button>
        </div>
        <div id="tasks" class="tasks"></div>
      </section>

      <section class="card">
        <h2>History</h2>
        <div id="history" class="history"></div>
      </section>
    </main>

    <template id="task-template">
      <article class="task">
        <div class="task-header">
          <div>
            <h3 class="filename"></h3>
            <p class="url"></p>
          </div>
          <span class="status"></span>
        </div>

        <div class="progress-wrap">
          <div class="progress-bar"></div>
        </div>

        <div class="stats"></div>

        <div class="actions">
          <button data-action="start">Start</button>
          <button data-action="pause">Pause</button>
          <button data-action="resume">Resume</button>
          <button data-action="cancel" class="danger">Cancel</button>
        </div>
      </article>
    </template>

    <script src="/static/app.js"></script>
  </body>
</html>
